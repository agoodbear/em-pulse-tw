name: Update EM Pulse data

on:
  schedule:
    # 每天 22:00 UTC ＝ 隔日 06:00 台灣時間（清晨更新）
    - cron: '0 22 * * *'
  workflow_dispatch:        # 也可在 Actions 頁手動觸發

permissions:
  contents: write           # 讓 Action 能把更新後的 pulse.json commit 回來

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate pulse.json
        # 如有 NCBI API key，可在 repo Settings → Secrets 設 NCBI_API_KEY 提高速率上限
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python generate_pulse.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pulse.json
          if git diff --staged --quiet; then
            echo "今日無變動，跳過 commit"
          else
            git commit -m "chore: update pulse data $(date -u +%F)"
            git push
          fi
