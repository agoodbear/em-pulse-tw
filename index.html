<script>
const TYPE_LABELS = {
  'meta-analysis':'統合分析','systematic-review':'系統性回顧',
  'rct':'隨機對照試驗','clinical-trial':'臨床試驗','guideline':'臨床指引',
  'review':'綜論','original':'原著研究','case-report':'病例報告',
  'editorial':'社論','letter':'來函','comment':'評論',
};
const TYPE_ORDER = ['guideline','meta-analysis','systematic-review','rct','clinical-trial','review','original','case-report','editorial','letter','comment'];

function typeLabel(t) { return TYPE_LABELS[t] || t; }

function relDate(s) {
  if (!s) return '';
  const d = new Date(s), now = new Date();
  const days = Math.floor((now - d) / 86400000);
  if (days === 0) return '今天';
  if (days === 1) return '昨天';
  if (days < 7) return `${days} 天前`;
  return d.toLocaleDateString('zh-TW', { month:'long', day:'numeric' });
}

function sw(score, max) { return Math.max(5, Math.round((score / Math.max(max,1)) * 100)); }

let state = {
  all:[], filtered:[], activeFilter:'all', activeKeyword:null,
  page:0, pageSize:30, maxScore:100,
};

function renderStats(data) {
  document.getElementById('stat-total').textContent    = data.stats.total;
  document.getElementById('stat-tier1').textContent    = data.stats.byTier?.[1] ?? '—';
  const d = new Date(data.generatedAt);
  document.getElementById('stat-updated').textContent  =
    d.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('live-label').textContent = '即時';
}

function renderAOW(a, max) {
  if (!a) return '';
  return `
  <div class="section-head fade-in">
    <span class="section-label">本週精選</span>
    <div class="section-rule"></div>
  </div>
  <div class="aow fade-in">
    <div class="aow-badge">★ 本週文獻</div>
    <div class="aow-title"><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></div>
    <div class="aow-meta">
      <span class="tier-badge t${a.journalTier}">Tier ${a.journalTier}</span>
      <span class="type-badge ${a.articleType}">${typeLabel(a.articleType)}</span>
      <span class="meta-journal">${a.journal}</span>
      <span class="meta-date">${relDate(a.pubDate)}</span>
    </div>
    ${a.abstract ? `<p class="aow-abstract">${a.abstract}</p>` : ''}
    <div class="aow-footer">
      <span class="aow-authors">${a.authors.join(', ')}</span>
      <div class="score-wrap">
        <span class="score-label">影響力 ${a.impactScore}</span>
        <div class="score-bar"><div class="score-bar-fill" style="width:${sw(a.impactScore,max)}%"></div></div>
      </div>
    </div>
  </div>`;
}

function renderCard(a, rank, max) {
  return `
  <a class="article-card fade-in" href="${a.url}" target="_blank" rel="noopener">
    <div class="article-rank">${String(rank).padStart(2,'0')}</div>
    <div>
      <div class="article-title">${a.title}</div>
      <div class="article-meta">
        <span class="tier-badge t${a.journalTier}">T${a.journalTier}</span>
        <span class="type-badge ${a.articleType}">${typeLabel(a.articleType)}</span>
        <span class="meta-journal">${a.journal}</span>
        <span class="meta-date">${relDate(a.pubDate)}</span>
        <span class="meta-authors">${a.authors.slice(0,2).join(', ')}${a.authors.length>2?' 等':''}</span>
        <span class="score-mini">↑${a.impactScore}</span>
      </div>
    </div>
  </a>`;
}

function renderTypeDist(articles) {
  const counts = {};
  articles.forEach(a => { counts[a.articleType] = (counts[a.articleType]||0)+1; });
  const max = Math.max(...Object.values(counts), 1);
  const colors = {
    guideline:'#c0392b','meta-analysis':'#7c3aed','systematic-review':'#7c3aed',
    rct:'#b85c00','clinical-trial':'#b85c00',review:'#1a7a5a',
    original:'#aaa',default:'#ccc'
  };
  return TYPE_ORDER.filter(t => counts[t]).map(t => `
    <div class="dist-row">
      <span class="dist-label">${typeLabel(t)}</span>
      <div class="dist-bar-wrap">
        <div class="dist-bar" style="width:${Math.round((counts[t]/max)*100)}%;background:${colors[t]||colors.default}"></div>
      </div>
      <span class="dist-count">${counts[t]}</span>
    </div>`).join('');
}

function renderKeywords(articles) {
  const counts = {};
  articles.forEach(a => {
    [...(a.keywords||[]),...(a.meshTerms||[])].forEach(k => {
      const n = k.trim();
      if (n.length > 3 && n.length < 40) counts[n] = (counts[n]||0)+1;
    });
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,28)
    .map(([k]) => `<span class="keyword-tag" data-kw="${k}">${k}</span>`).join('');
}

function renderPagination(filtered, page, ps) {
  const pages = Math.ceil(filtered.length / ps);
  if (pages <= 1) return '';
  let h = '';
  if (page > 0) h += `<button class="page-btn" data-page="${page-1}">← 上一頁</button>`;
  h += `<span class="page-info">${page+1} / ${pages}</span>`;
  if (page < pages-1) h += `<button class="page-btn" data-page="${page+1}">下一頁 →</button>`;
  return `<div class="pagination">${h}</div>`;
}

function renderContent() {
  const { all, filtered, page, pageSize, maxScore, activeFilter, activeKeyword } = state;
  const start = page * pageSize;
  const slice = filtered.slice(start, start + pageSize);

  const isDefaultView = activeFilter === 'all' && !activeKeyword;
  const aowHTML = (page === 0 && isDefaultView && all.length > 0)
    ? renderAOW(all[0], maxScore) : '';

  const filters = ['all','tier1','guideline','meta-analysis','rct','review','original'];
  const fLabels = { all:'全部', tier1:'Tier 1', guideline:'指引',
    'meta-analysis':'統合分析', rct:'隨機試驗', review:'綜論', original:'原著' };
  const filterBar = `
    <div class="filter-bar fade-in">
      ${filters.map(f => `
        <button class="filter-btn${activeFilter===f&&!activeKeyword?' active':''}" data-filter="${f}">
          ${fLabels[f]}
        </button>`).join('')}
      ${activeKeyword ? `<button class="filter-btn active" data-filter="all">「${activeKeyword}」✕</button>` : ''}
    </div>`;

  const listLabel = activeKeyword
    ? `「${activeKeyword}」共 ${filtered.length} 筆結果`
    : `${filtered.length} 篇文獻`;
  const sectionHead = `
    <div class="section-head fade-in">
      <span class="section-label">${listLabel}</span>
      <div class="section-rule"></div>
    </div>`;

  const listItems = (page === 0 && isDefaultView)
    ? slice.filter(a => a.pmid !== all[0]?.pmid) : slice;

  const listHTML = `
    <div class="article-list">
      ${listItems.map((a,i) => renderCard(a, start+i+1, maxScore)).join('')}
    </div>`;

  const sidebar = `
    <aside class="sidebar fade-in">
      <div class="sidebar-card">
        <div class="sidebar-title">文獻類型</div>
        ${renderTypeDist(all)}
      </div>
      <div class="sidebar-card">
        <div class="sidebar-title">熱門主題</div>
        <div class="keyword-list">${renderKeywords(all)}</div>
      </div>
      <div class="sidebar-card sidebar-about">
        <div class="sidebar-title">運作原理</div>
        <p class="about-text">每天清晨連線 PubMed，掃描近 7 天發表、與急診醫學及重症照護相關的文獻。每篇文獻依期刊影響力、文獻類型與發表日期計分。</p>
        <p class="about-text" style="margin-top:.6rem">沒有任何人工挑選——完全自動產生。</p>
      </div>
    </aside>`;

  document.getElementById('content').innerHTML = `
    ${aowHTML}
    ${filterBar}
    ${sectionHead}
    <div class="main-grid">
      <div>
        ${listHTML}
        ${renderPagination(filtered, page, pageSize)}
      </div>
      ${sidebar}
    </div>`;

  document.querySelectorAll('.filter-btn[data-filter]').forEach(btn =>
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter)));
  document.querySelectorAll('.page-btn[data-page]').forEach(btn =>
    btn.addEventListener('click', () => {
      state.page = parseInt(btn.dataset.page);
      renderContent();
      window.scrollTo({ top: 180, behavior: 'smooth' });
    }));
  document.querySelectorAll('.keyword-tag').forEach(tag =>
    tag.addEventListener('click', () => applyKeyword(tag.dataset.kw)));
}

function applyFilter(type) {
  state.activeFilter = type; state.activeKeyword = null; state.page = 0;
  state.filtered = type === 'all' ? [...state.all]
    : type === 'tier1' ? state.all.filter(a => a.journalTier === 1)
    : state.all.filter(a => a.articleType === type);
  renderContent();
}

function applyKeyword(kw) {
  state.activeKeyword = kw; state.activeFilter = 'all'; state.page = 0;
  const kl = kw.toLowerCase();
  state.filtered = state.all.filter(a =>
    (a.keywords||[]).some(k => k.toLowerCase().includes(kl)) ||
    (a.meshTerms||[]).some(k => k.toLowerCase().includes(kl)) ||
    a.title.toLowerCase().includes(kl));
  renderContent();
}

async function loadData() {
  try {
    const res = await fetch(`data/pulse.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    state.all = data.articles || [];
    state.filtered = [...state.all];
    state.maxScore = data.stats?.topScore || 100;
    renderStats(data);
    renderContent();
  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="status">
        <p class="status-text" style="color:#c0392b">資料載入失敗 — ${e.message}</p>
      </div>`;
    document.getElementById('live-label').textContent = '錯誤';
  }
}

loadData();
</script>
</body>
</html>
